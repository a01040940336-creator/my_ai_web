<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나의 첫 번째 웹사이트</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0c29; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: rgba(255,255,255,0.08); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; padding: 48px 40px; max-width: 480px; width: 90%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
    .avatar { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 2rem; margin-bottom: 8px; background: linear-gradient(135deg, #a78bfa, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .subtitle { color: #94a3b8; font-size: 1rem; margin-bottom: 28px; }
    .badge { display: inline-block; background: rgba(167,139,250,0.2); border: 1px solid #a78bfa; color: #a78bfa; border-radius: 20px; padding: 6px 16px; font-size: 0.85rem; margin: 4px; }
    .footer { margin-top: 32px; color: #475569; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">👋</div>
    <h1>안녕하세요!</h1>
    <p class="subtitle">나의 첫 번째 웹사이트에 오신 걸 환영합니다</p>
    <span class="badge">🚀 개발 중</span>
    <span class="badge">💡 배우는 중</span>
    <span class="badge">🌱 성장 중</span>
    <p class="footer">GitHub Pages로 배포되었습니다 ✨</p>
  </div>
</body>
</html>
