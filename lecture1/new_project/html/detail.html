<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOVION - 콘텐츠 상세</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/detail.css">
</head>
<body>
  <div id="sidebar"></div>
  <div id="bottom-nav"></div>

  <div class="page-wrapper">
    <header class="top-header">
      <button onclick="history.back()" class="btn btn-ghost btn-sm">← 뒤로</button>
      <div style="flex:1"></div>
    </header>

    <main class="page-content" id="detail-main">
      <div class="spinner-wrap" style="min-height:60vh"><div class="spinner"></div></div>
    </main>
  </div>

  <!-- 예고편 모달 -->
  <div id="trailer-modal" style="display:none;position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,0.85);align-items:center;justify-content:center">
    <div style="position:relative;width:90%;max-width:800px">
      <button id="modal-close" style="position:absolute;top:-40px;right:0;background:none;border:none;color:white;font-size:1.5rem;cursor:pointer">✕ 닫기</button>
      <div style="position:relative;padding-bottom:56.25%;height:0;border-radius:12px;overflow:hidden">
        <iframe id="trailer-iframe" style="position:absolute;inset:0;width:100%;height:100%" frameborder="0" allowfullscreen></iframe>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module" src="../js/nav.js"></script>
  <script type="module" src="../js/detail.js"></script>
</body>
</html>
