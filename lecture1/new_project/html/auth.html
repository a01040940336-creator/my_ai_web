<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOVION - 로그인 / 회원가입</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
  <!-- 좌측 상단 뒤로가기 / 홈 버튼 -->
  <div class="auth-nav">
    <button class="auth-back-btn" id="back-btn">← 뒤로가기</button>
    <a class="auth-home-btn" id="home-btn" href="../index.html">🏠 홈으로</a>
  </div>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">MOVION</div>
      <p class="auth-subtitle">지금 바로 스트리밍을 시작하세요</p>

      <!-- 탭 -->
      <div class="tab-group">
        <button class="tab-btn active" id="tab-login">로그인</button>
        <button class="tab-btn" id="tab-signup">회원가입</button>
      </div>

      <!-- 로그인 폼 -->
      <form id="login-form">
        <div class="form-group">
          <label class="form-label">이메일</label>
          <input type="email" class="form-input" id="login-email" placeholder="email@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">비밀번호</label>
          <input type="password" class="form-input" id="login-pw" placeholder="비밀번호를 입력하세요" required>
        </div>
        <p class="form-error" id="login-error"></p>
        <button type="submit" class="submit-btn" id="login-btn">로그인</button>
      </form>

      <!-- 회원가입 폼 -->
      <form id="signup-form" style="display:none">
        <div class="form-group">
          <label class="form-label">이메일</label>
          <input type="email" class="form-input" id="signup-email" placeholder="email@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">비밀번호 (6자 이상)</label>
          <input type="password" class="form-input" id="signup-pw" placeholder="비밀번호를 입력하세요" required minlength="6">
        </div>
        <div class="form-group">
          <label class="form-label">비밀번호 확인</label>
          <input type="password" class="form-input" id="signup-pw2" placeholder="비밀번호를 다시 입력하세요" required>
        </div>
        <p class="form-error" id="signup-error"></p>
        <button type="submit" class="submit-btn" id="signup-btn">회원가입</button>
      </form>

      <!-- 소셜 로그인 (UI only) -->
      <div class="social-divider">또는</div>
      <button class="social-btn">
        <span>🔵</span> Google로 계속하기
      </button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module" src="../js/auth-page.js"></script>
  <script>
    document.getElementById('back-btn').addEventListener('click', () => {
      if (history.length > 1) {
        history.back()
      } else {
        window.location.href = '../index.html'
      }
    })
  </script>
</body>
</html>
