<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOVION - 로그인 / 회원가입</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">

      <a class="auth-home-link" href="../index.html">← 홈으로</a>

      <div class="auth-logo">MOVION</div>
      <p class="auth-subtitle">AI 기반 OTT 콘텐츠 추천 플랫폼</p>

      <!-- 탭 -->
      <div class="tab-group">
        <button class="tab-btn active" id="tab-login">로그인</button>
        <button class="tab-btn" id="tab-signup">회원가입</button>
      </div>

      <!-- ── 로그인 폼 ── -->
      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="login-email">이메일</label>
          <div class="input-wrap">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <input type="email" class="form-input" id="login-email" placeholder="email@example.com" autocomplete="email">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="login-pw">비밀번호</label>
          <div class="input-wrap">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" class="form-input" id="login-pw" placeholder="비밀번호를 입력하세요" autocomplete="current-password">
            <button type="button" class="pw-toggle" data-target="login-pw" aria-label="비밀번호 표시">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <p class="form-error" id="login-error"></p>
        <button type="submit" class="submit-btn" id="login-btn">로그인</button>
      </form>

      <!-- ── 회원가입 폼 ── -->
      <form id="signup-form" style="display:none" novalidate>
        <div class="form-group">
          <label class="form-label" for="signup-email">이메일</label>
          <div class="input-wrap">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <input type="email" class="form-input" id="signup-email" placeholder="email@example.com" autocomplete="email">
          </div>
          <p class="field-error" id="err-email"></p>
        </div>

        <div class="form-group">
          <label class="form-label" for="signup-username">아이디 <span class="form-hint">(3~20자, 영문·숫자·한글·언더바)</span></label>
          <div class="input-wrap">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" class="form-input" id="signup-username" placeholder="사용할 아이디를 입력하세요" autocomplete="username">
            <button type="button" class="check-btn" id="username-check-btn">중복확인</button>
          </div>
          <p class="field-msg" id="msg-username"></p>
        </div>

        <div class="form-group">
          <label class="form-label" for="signup-pw">비밀번호 <span class="form-hint">(6자 이상)</span></label>
          <div class="input-wrap">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" class="form-input" id="signup-pw" placeholder="6자 이상 입력" autocomplete="new-password">
            <button type="button" class="pw-toggle" data-target="signup-pw" aria-label="비밀번호 표시">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="pw-strength-bar"><div class="pw-strength-fill" id="pw-strength-fill"></div></div>
          <p class="field-error" id="err-pw"></p>
        </div>

        <div class="form-group">
          <label class="form-label" for="signup-pw2">비밀번호 확인</label>
          <div class="input-wrap">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" class="form-input" id="signup-pw2" placeholder="비밀번호를 다시 입력" autocomplete="new-password">
          </div>
          <p class="field-error" id="err-pw2"></p>
        </div>

        <p class="form-error" id="signup-error"></p>
        <button type="submit" class="submit-btn" id="signup-btn">회원가입</button>
      </form>

      <!-- 소셜 로그인 -->
      <div class="social-divider">또는 소셜 계정으로 계속하기</div>

      <div class="social-btns">
        <button class="social-btn google-btn" id="btn-google">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Google로 로그인
        </button>
        <button class="social-btn naver-btn" id="btn-naver">
          <span class="naver-n">N</span>
          네이버로 로그인
        </button>
        <button class="social-btn kakao-btn" id="btn-kakao">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#3C1E1E"><path d="M12 3C6.48 3 2 6.48 2 10.8c0 2.73 1.6 5.13 4.01 6.6L5 21l4.27-2.4c.87.19 1.79.3 2.73.3 5.52 0 10-3.48 10-7.8S17.52 3 12 3z"/></svg>
          카카오로 로그인
        </button>
      </div>

    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script type="module" src="../js/auth-page.js"></script>
</body>
</html>
