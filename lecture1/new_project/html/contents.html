<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOVION - 콘텐츠 목록</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/contents.css">
</head>
<body>
  <div id="sidebar"></div>
  <div id="bottom-nav"></div>

  <div class="page-wrapper">
    <header class="top-header">
      <span style="font-weight:700;font-size:1rem">콘텐츠 목록</span>
      <div style="flex:1"></div>
      <a href="../html/upload.html" class="btn btn-primary btn-sm">+ 등록</a>
    </header>

    <main class="page-content">
      <div class="container">
        <div class="contents-header">
          <h1>🎬 전체 콘텐츠</h1>
          <div class="filter-tabs">
            <button class="filter-tab active" data-filter="all">전체</button>
            <button class="filter-tab" data-filter="movie">영화</button>
            <button class="filter-tab" data-filter="drama">드라마</button>
            <button class="filter-tab" data-filter="series">시리즈</button>
          </div>
        </div>

        <div class="contents-grid" id="contents-grid">
          <div class="spinner-wrap" style="grid-column:1/-1"><div class="spinner"></div></div>
        </div>
      </div>
    </main>
  </div>

  <!-- 예고편 모달 -->
  <div id="trailer-modal" style="display:none;position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,0.85);align-items:center;justify-content:center">
    <div style="position:relative;width:90%;max-width:800px">
      <button id="modal-close" style="position:absolute;top:-40px;right:0;background:none;border:none;color:white;font-size:1.5rem;cursor:pointer">✕ 닫기</button>
      <div style="position:relative;padding-bottom:56.25%;height:0;border-radius:12px;overflow:hidden">
        <iframe id="trailer-iframe" style="position:absolute;inset:0;width:100%;height:100%" frameborder="0" allowfullscreen></iframe>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module" src="../js/nav.js"></script>
  <script type="module" src="../js/contents.js"></script>
</body>
</html>
