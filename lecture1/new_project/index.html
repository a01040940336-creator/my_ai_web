<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOVION - 당신의 스트리밍 세상</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/common.css">
  <link rel="stylesheet" href="./css/home.css">
</head>
<body>
  <header class="top-header"></header>
  <nav id="bottom-nav" class="bottom-nav"></nav>

  <div class="page-wrapper">
    <main>

      <!-- HERO: 2-column layout -->
      <section class="hero-container">

        <!-- 왼쪽: 메인 히어로 -->
        <div class="hero-main" id="hero-main">
          <img class="hero-main-bg" id="hero-img" src="" alt="">
          <div class="hero-main-content">
            <span class="hero-label" id="hero-label">추천 콘텐츠</span>
            <h1 id="hero-title">로딩 중...</h1>
            <p id="hero-desc"></p>
            <div class="cta">
              <button class="btn-watch" id="hero-play-btn">▶ 재생</button>
              <button class="btn-save" id="hero-save-btn">＋ 저장</button>
            </div>
          </div>
        </div>

        <!-- 오른쪽: 사이드 카드 3개 -->
        <div class="hero-side">
          <a class="side-card" href="./html/contents.html">
            <h3>⚡ AI Trending</h3>
            <p>실시간 인기 콘텐츠 분석</p>
          </a>
          <a class="side-card" href="./html/contents.html?type=movie">
            <h3>🎬 최신 영화</h3>
            <p>이번 달 신규 개봉 영화</p>
          </a>
          <a class="side-card" href="./html/contents.html?type=drama">
            <h3>📺 드라마 추천</h3>
            <p>취향 기반 드라마 자동 추천</p>
          </a>
        </div>

      </section>

      <!-- 주요 콘텐츠 그리드 -->
      <section class="home-section">
        <h2>주요 콘텐츠</h2>
        <div class="grid" id="main-grid">
          <div class="spinner-wrap" style="grid-column:1/-1"><div class="spinner"></div></div>
        </div>
      </section>

      <!-- 상세 정보 -->
      <section class="home-section" style="margin-top:28px">
        <h2>상세 정보</h2>
        <div class="detail-card" id="detail-card">
          <div class="spinner-wrap" style="width:100%"><div class="spinner"></div></div>
        </div>
      </section>

      <!-- 추천 콘텐츠 그리드 -->
      <section class="home-section" style="margin-top:36px">
        <h2>추천 콘텐츠</h2>
        <div class="grid" id="recommend-grid">
          <div class="spinner-wrap" style="grid-column:1/-1"><div class="spinner"></div></div>
        </div>
      </section>

      <footer class="home-footer">© 2026 MOVION | All Rights Reserved</footer>
    </main>
  </div>

  <!-- 예고편 모달 -->
  <div id="trailer-modal" style="display:none;position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,0.9);align-items:center;justify-content:center">
    <div style="position:relative;width:90%;max-width:860px">
      <button id="modal-close" style="position:absolute;top:-40px;right:0;background:none;border:none;color:white;font-size:1.4rem;cursor:pointer">✕ 닫기</button>
      <div style="position:relative;padding-bottom:56.25%;height:0;border-radius:8px;overflow:hidden">
        <iframe id="trailer-iframe" style="position:absolute;inset:0;width:100%;height:100%" frameborder="0" allowfullscreen></iframe>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module" src="./js/nav.js"></script>
  <script type="module" src="./js/home.js"></script>
</body>
</html>
