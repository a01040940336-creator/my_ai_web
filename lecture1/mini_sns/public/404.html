<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>POP SPOT</title>
  <script>
    // GitHub Pages SPA redirect hack
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.host + l.pathname.split('/').slice(0, 2).join('/') +
      '/?/' + l.pathname.slice(1) + (l.search ? '&' + l.search.slice(1) : '') + l.hash
    );
  </script>
</head>
<body></body>
</html>
