<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>POP SPOT</title>
  <script>
    var l = window.location;
    var base = '/my_ai_web';
    var pathAfterBase = l.pathname.slice(base.length).replace(/^\//, '');
    l.replace(
      l.protocol + '//' + l.host + base +
      '/?/' + pathAfterBase +
      (l.search ? '&' + l.search.slice(1) : '') + l.hash
    );
  </script>
</head>
<body></body>
</html>
