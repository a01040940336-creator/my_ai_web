<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="description" content="POP SPOT - 팝업 · 전시 큐레이션 플랫폼" />
    <title>POP SPOT</title>
    <script>
      // GitHub Pages SPA redirect restore
      (function(l) {
        if (l.search[1] === '/') {
          var path = l.search.slice(1).split('&')[0];
          var query = l.search.slice(1).split('&').slice(1).join('&');
          window.history.replaceState(null, null,
            '/my_ai_web/' + path.replace(/^\//, '') +
            (query ? '?' + query : '') + l.hash
          );
        }
      }(window.location))
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
