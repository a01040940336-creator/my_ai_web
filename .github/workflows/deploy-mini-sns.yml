name: Deploy mini_sns to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'lecture1/mini_sns/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: lecture1/mini_sns/package-lock.json

      - name: Install dependencies
        working-directory: lecture1/mini_sns
        run: npm ci

      - name: Build
        working-directory: lecture1/mini_sns
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: lecture1/mini_sns/dist
          destination_dir: mini_sns
          keep_files: false
