name: Deploy POP SPOT + 집담 to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'lecture1/mini_sns/**'
      - 'lecture1/my-community/**'
      - '.github/workflows/deploy-mini-sns.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── POP SPOT (mini_sns) 빌드 ──────────────────────────────────
      - name: Install dependencies (mini_sns)
        working-directory: lecture1/mini_sns
        run: npm install

      - name: Build (mini_sns)
        working-directory: lecture1/mini_sns
        run: npm run build

      # ── 집담 (my-community) 빌드 ─────────────────────────────────
      - name: Install dependencies (my-community)
        working-directory: lecture1/my-community
        run: npm install

      - name: Build (my-community)
        working-directory: lecture1/my-community
        run: npm run build

      # ── artifact 폴더 구조 생성 ───────────────────────────────────
      # POP SPOT → /my_ai_web/  (vite base: /my_ai_web/)
      # 집담     → /my_ai_web/lecture1/my-community/  (vite base: /my_ai_web/lecture1/my-community/)
      - name: Prepare artifact directory structure
        run: |
          mkdir -p pages-root/my_ai_web/lecture1/my-community
          cp -r lecture1/mini_sns/dist/. pages-root/my_ai_web/
          cp -r lecture1/my-community/dist/. pages-root/my_ai_web/lecture1/my-community/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'pages-root'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
