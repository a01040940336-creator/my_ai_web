name: Deploy POP SPOT + 집담 + MOVION to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'lecture1/mini_sns/**'
      - 'lecture1/my-community/**'
      - 'lecture1/new_project/**'
      - '.github/workflows/deploy-mini-sns.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── POP SPOT (mini_sns) 빌드 ──────────────────────────────────
      - name: Install dependencies (mini_sns)
        working-directory: lecture1/mini_sns
        run: npm install

      - name: Build (mini_sns)
        working-directory: lecture1/mini_sns
        run: npm run build

      # ── 집담 (my-community) 빌드 ─────────────────────────────────
      - name: Install dependencies (my-community)
        working-directory: lecture1/my-community
        run: npm install

      - name: Build (my-community)
        working-directory: lecture1/my-community
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      # ── MOVION (new_project) 빌드 ────────────────────────────────
      - name: Install dependencies (new_project)
        working-directory: lecture1/new_project
        run: npm install

      - name: Build (new_project / MOVION)
        working-directory: lecture1/new_project
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      # ── artifact 폴더 구조 생성 ───────────────────────────────────
      # GitHub Pages 루트 = https://a01040940336-creator.github.io/my_ai_web/
      # artifact 루트가 곧 사이트 루트이므로 /my_ai_web/ 폴더를 만들지 않음
      #
      # POP SPOT → pages-root/                          (URL: /my_ai_web/)
      # 집담     → pages-root/lecture1/my-community/    (URL: /my_ai_web/lecture1/my-community/)
      # MOVION   → pages-root/lecture1/new_project/     (URL: /my_ai_web/lecture1/new_project/)
      - name: Prepare artifact directory structure
        run: |
          mkdir -p pages-root/lecture1/my-community
          mkdir -p pages-root/lecture1/new_project
          cp -r lecture1/mini_sns/dist/. pages-root/
          cp -r lecture1/my-community/dist/. pages-root/lecture1/my-community/
          cp -r lecture1/new_project/dist/. pages-root/lecture1/new_project/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'pages-root'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
